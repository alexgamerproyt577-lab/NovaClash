<!DOCTYPE html>
<html lang="es">

<head>

<title>Panel Admin - Nova Clash</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Panel de Administración</h1>

<input type="checkbox" id="estadoPredicciones">

Predicciones abiertas

<br><br>

</button>

<option value="2">16avos - Bloque 2</option>

</select>

<br><br>

<button onclick="guardarBloque()">
Guardar Bloque
</button>

<hr>

<h2>Resultados</h2>

<div id="adminPartidos"></div>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
